<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>20時間逃げ切れ！カーチェイスゲーム（仮）</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div id="game-root">
      <canvas id="game-canvas"></canvas>

      <section id="title-screen" class="screen is-active">
        <div class="title-block">
          <p class="kicker">ハリボテ3Dカーチェイス</p>
          <h1>20時間逃げ切れ！</h1>
          <p class="lead">理不尽な逮捕から逃げ続けろ。煽るほど、追っ手は増える。</p>
          <button id="start-button" class="primary-button">スタート</button>
        </div>
      </section>

      <section id="difficulty-screen" class="screen difficulty-screen">
        <div class="choice-panel">
          <p class="kicker">難易度選択</p>
          <h2>逃げ切る時間を選べ</h2>
          <div id="difficulty-options" class="choice-row"></div>
        </div>
      </section>

      <section id="vehicle-screen" class="screen vehicle-screen">
        <div class="choice-panel">
          <p class="kicker">車種選択</p>
          <h2>今回の逃走車</h2>
          <div id="vehicle-options" class="choice-row vehicle-row"></div>
        </div>
      </section>

      <section id="intro-screen" class="screen dialogue-screen">
        <div class="dialogue-box">
          <p id="dialogue-text">そこの車、止まってください。</p>
          <button id="dialogue-button" class="primary-button">進む</button>
        </div>
      </section>

      <div id="hud" class="hud" hidden>
        <div class="hud-cluster">
          <div class="hud-item">
            <span>残り</span>
            <strong id="time-left">00:00:00;00</strong>
          </div>
          <div class="hud-item">
            <span>パトカー</span>
            <strong id="police-count">1</strong>
          </div>
          <div class="hud-item">
            <span>煽り</span>
            <strong id="taunt-count">0</strong>
          </div>
        </div>
        <div class="arrest-meter" aria-label="逮捕ゲージ">
          <span id="arrest-fill"></span>
        </div>
      </div>

      <div id="mobile-controls" class="mobile-controls" hidden>
        <div class="steer-controls">
          <button data-touch="left" aria-label="左">←</button>
          <button data-touch="right" aria-label="右">→</button>
        </div>
        <div class="drive-controls">
          <button data-touch="taunt" class="taunt-button" aria-label="煽り">煽</button>
          <button data-touch="brake" aria-label="ブレーキ">B</button>
          <button data-touch="accelerate" aria-label="アクセル">A</button>
        </div>
      </div>

      <section id="result-screen" class="screen result-screen">
        <div class="result-box">
          <p id="result-kicker" class="kicker">逃走終了</p>
          <h2 id="result-title">ゲームオーバー</h2>
          <p id="result-summary"></p>
          <button id="restart-button" class="primary-button">タイトルへ</button>
        </div>
      </section>
    </div>

    <script src="./src/bundle.js"></script>
  </body>
</html>
